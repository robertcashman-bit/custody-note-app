# On push of a version tag (e.g. v1.4.24), build the Windows installer and publish
# to GitHub Releases. If GH_PAT + VERCEL_TOKEN are set, also syncs the website to Vercel.
#
# Prerequisites (Settings > Secrets and variables > Actions):
# - VERCEL_TOKEN  — from Vercel dashboard > Settings > Tokens
# - GH_PAT        — GitHub PAT with repo scope to clone the website repo
#   Create at https://github.com/settings/tokens
# GITHUB_TOKEN is provided automatically and is used to create the app release.
#
# To run: push a tag matching package.json version, e.g.:
#   git tag v1.4.24
#   git push origin v1.4.24

name: Release and deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── Job 1: Build the Electron app and publish to GitHub Releases ────────────
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: custody-note-app
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: custody-note-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: custody-note-app

      - name: Run unit tests
        run: npm run test:unit
        working-directory: custody-note-app

      - name: Verify release consistency
        run: node scripts/verify-release-consistency.mjs
        working-directory: custody-note-app

      - name: Build and publish to GitHub
        working-directory: custody-note-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

  # ─── Job 2: Sync website and deploy to Vercel ────────────────────────────────
  # Requires GH_PAT (to clone website repo) and VERCEL_TOKEN (to deploy).
  # Skipped automatically if either secret is absent (no-op when ${{ secrets.GH_PAT }} is empty).
  deploy-website:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ secrets.GH_PAT != '' && secrets.VERCEL_TOKEN != '' }}
    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: custody-note-app
          ref: ${{ github.ref }}

      - name: Checkout website
        uses: actions/checkout@v4
        with:
          repository: robertcashman-bit/super-parakeet
          path: custody note - website production
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: custody-note-app/package-lock.json

      - name: Install app dependencies
        run: npm ci
        working-directory: custody-note-app

      - name: Sync and deploy website
        working-directory: custody-note-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: node scripts/release.mjs current --no-publish
