# On push of a version tag (e.g. v1.4.24), build the Windows installer and publish
# to GitHub Releases. If GH_PAT + VERCEL_TOKEN are set, also syncs the website to Vercel.
#
# Prerequisites (Settings > Secrets and variables > Actions):
# - VERCEL_TOKEN  — from Vercel dashboard > Settings > Tokens
# - GH_PAT        — GitHub PAT with repo scope to clone the website repo
#   Create at https://github.com/settings/tokens
# GITHUB_TOKEN is provided automatically and is used to create the app release.
#
# To run:
#   • Automatic: push version + changelog to main/master → "Auto-tag release if needed"
#     creates v{x.y.z} if missing → this workflow runs on that tag.
#   • Manual app build: Actions → this workflow → Run workflow (builds from selected branch).
#   • Manual tag: git tag v1.4.24 && git push origin v1.4.24
#
# Secrets (optional website deploy): GH_PAT, VERCEL_TOKEN — see below.

name: Release and deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Job 1: Build the Electron app and publish to GitHub Releases ────────────
  # Only requires the automatic GITHUB_TOKEN — no GH_PAT needed.
  release:
    runs-on: windows-latest
    permissions:
      contents: write  # needed to create GitHub Releases and upload assets
    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: custody-note-app
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: custody-note-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: custody-note-app

      - name: Build and publish to GitHub
        working-directory: custody-note-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

  # ─── Job 2: Sync website changelog and deploy to Vercel ──────────────────────
  # Optional — continue-on-error means a missing GH_PAT/VERCEL_TOKEN won't fail
  # the overall workflow. The release job above always runs independently.
  deploy-website:
    runs-on: ubuntu-latest
    needs: release
    continue-on-error: true
    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: custody-note-app
          ref: ${{ github.ref }}

      - name: Checkout website
        uses: actions/checkout@v4
        with:
          repository: robertcashman-bit/super-parakeet
          path: custody note - website production
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: custody-note-app/package-lock.json

      - name: Install app dependencies
        run: npm ci
        working-directory: custody-note-app

      - name: Configure git for website commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync website releases.json and push
        working-directory: custody-note-app
        env:
          WEBSITE_ROOT: ${{ github.workspace }}/custody note - website production
        run: node scripts/sync-website.mjs
